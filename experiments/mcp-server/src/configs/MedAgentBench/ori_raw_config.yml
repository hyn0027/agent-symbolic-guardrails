DATASET:
  NAME: "MedAgentBench"
  DOCKER:
    IMAGE: "jyxsu6/medagentbench:latest"
    CONTAINER_NAME: "medagentbench_container"
    HOST_PORT: 8080
    CONTAINER_PORT: 8080
    READY_TIMEOUT: 180
    RESTART_IF_RUNNING: false
    REUSE_STOPPED_CONTAINER: true
    STOP_WHEN_END: false
    REMOVE_WHEN_STOPPED: false
  SERVER:
    BASE_URL: "http://localhost:8080/fhir/"
    BLOCK_WRITE_API: false

SETTINGS:
  LOG_PATH: "ANONYMIZED_PATH/experiments/mcp-agents/logs/mcp-server/"

SAFEGUARD:
  API_CHECK: false
  TOOL_BLOCKING: false
  API_REDESIGN: false
  RESPONSE_FILTERING: false
  USER_CONFIRMATION: false
  TOOL_CALL_DISCLOSURE: false
  RAW_REQUEST_TOOL: true
  SAFETY_DATASET: false

ERROR_HANDLING:
  SILENT_CHECK: false
