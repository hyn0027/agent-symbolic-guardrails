DATASET:
  NAME: "CarBench"

AGENT:
  MODEL: "gpt-4o-mini"
  TEMPERATURE: 1.0

  MCP_SERVER_COMMAND: "start-mcp-server"

  MCP_SERVER_COMMAND_TEST_ARGS: "--config configs/CarBench/guardrail_config_base_test.yml"

  MCP_SERVER_COMMAND_GOLDEN_ARGS: null

  TEST_WITH_GOLDEN: false

  TEST_RAW_TOOL: false

  SAVE_STATE_BASE_PATH: null

  SAVE_STATE_EXTENTION: null

  MAX_GOLDEN_RETRIES: 5

  MAX_TOOL_CALL_FAILS: 10

  AGENT_INITIAL_MESSAGE: true

  INITIAL_CONVERSTION: "Hi! How can I help you today?"

  DOMAIN_POLICY_FILE: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/experiments/data/Car-Bench/wiki.md"

  SYSTEM_PROMPT_TEMPLATE: "{agent_instruction}{domain_policy}"

  AGENT_INSTRUCTION: ""

  STRICT_TOOL_CALL: false

USER:
  MODEL: "gpt-4o-mini"
  TEMPERATURE: 1.0

EVAL:
  SAVE_PATH: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/experiments/data/Car-Bench/guardrail_results_base_test.json"

  MCP_SERVER_COMMAND: "start-mcp-server"
  MCP_SERVER_COMMAND_EVAL_ARGS: "--config configs/CarBench/baseline_config_base_test.yml"

  SCORE_TOOL_EXECUTION_ERRORS: true
  EVALUATE_POLICY: true
  SCORE_POLICY_ERRORS: true
  POLICY_EVALUATOR_STRATEGY: "llm"
  POLICY_EVALUATOR_MODEL: "gpt-4o-mini"
  POLICY_EVALUATOR_PROVIDER: "openai"

SETTINGS:
  LOG_PATH: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/experiments/logs/"

SAFEGUARD:
  USER_CONFIRMATION: true
  USER_CONFIRMATION_TEMPLATE: |
    I am about to perform the following action:
    Tool: {tool_name}
    Arguments: {tool_args}
    Additional Info: {user_confirmation_details}

    Please review the action above and confirm if you would like me to proceed.
    Please respond first with "CONFIRM" to proceed or "CANCEL" to abort. Then provide your additional notes after that if any.

  TOOL_RESPONSE_TEMPLATE: true

  TOOL_END_CONVERSATION_FLAG: true

  TOOL_BLOCKING: true

  TOOL_CALL_DISCLOSURE: true

  TOOL_CALL_DISCLOSURE_TEMPLATE: |
    Here is detailed information about tool calls the agent just made:
    {tool_call_disclosure}

  NO_TOOL_CALL_DISCLOSURE_MESSAGE: ""

SIMULATION:
  TASK_FILE: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/experiments/data/Car-Bench/dataset/tasks/base_test.jsonl"
  MAX_STEPS: 20
  MAX_WORKERS: 8
