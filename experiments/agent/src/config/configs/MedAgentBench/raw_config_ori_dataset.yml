DATASET:
  NAME: "MedAgentBench"

AGENT:
  MODEL: "gpt-5"
  TEMPERATURE: 1.0

  MCP_SERVER_COMMAND: "start-mcp-server"

  MCP_SERVER_COMMAND_TEST_ARGS: "--config configs/MedAgentBench/ori_raw_config.yml"

  MCP_SERVER_COMMAND_GOLDEN_ARGS: "--config configs/MedAgentBench/ori_golden_config.yml"

  TEST_WITH_GOLDEN: true

  TEST_RAW_TOOL: true

  MAX_GOLDEN_RETRIES: 5

  SAVE_STATE_BASE_PATH: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/experiments/data/MedAgentBench/tmp/"

  SAVE_STATE_EXTENTION: "json"

  MAX_TOOL_CALL_FAILS: 10

  AGENT_INITIAL_MESSAGE: true

  INITIAL_CONVERSTION: "Hi! How can I help you today?"

  DOMAIN_POLICY_FILE: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/experiments/data/MedAgentBench/policy_raw.md"

  SYSTEM_PROMPT_TEMPLATE: |
    <instructions>
    {agent_instruction}
    </instructions>
    <policy>
    {domain_policy}
    </policy>

  AGENT_INSTRUCTION: |
    You are an expert in using FHIR functions to assist medical professionals. 
    You are given a set of possible functions and will interact with a medical professional.
    You will need to make one or more function/tool calls to help the medical professional to achieve their purpose.

    You must strictly follow the <policy> provided below.

USER:
  MODEL: "gpt-5"
  TEMPERATURE: 1.0

  SYSTEM_PROMPT_TEMPLATE: |
    <system instruction>
    You are an LLM playing the role of a healthcare provider using an EMR system to retrieve and update patient information.
    You, as a healthcare provider, will interact with another LLM-agent that can help you retrieve and update patient data from the EMR system.
    You will communicate with the LLM-agent in muliple turns in natural language to accomplish your goals.
    </system instruction>
    <task instruction>
    Your will ask the agent to retrieve or post information for you, so that you can accomplish the following task:
    {task_goal}
    Here are some additional information that might be relevant to this task:
    {additional_info}
    </task instruction>
    <interaction instruction>
    At the first turn of the conversation, you must present the the task and the additional information exactly as provided above to the agent.
    Never make up or hallucinate information not provided above. Do not rely on your previous knowledge. Information that is not provided should be considered unknown or unavailable.
    Certain medical system details, such as coding systems and codes, may not follow the real-world standard, and you should not rely on your prior knowledge of real-world medical systems. Always refer to the provided information for any details about the medical system, and state that the information is unknown or unavailable if it is not provided.
    </interaction instruction>
    <answer instruction>
    When you get your final answer, and you believe that the agent has helped you achieve the task, you must end the conversation with the following format:
    Answer: <The answer to the task. If numerical, just provide the number without any additional text>
    ###STOP###
    </answer instruction>

EVAL:
  FHIR_API_BASE_URL: "http://127.0.0.1:8080/fhir/"
  SAVE_PATH: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/experiments/data/MedAgentBench/eval_results_ori_raw.json"

SETTINGS:
  LOG_PATH: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/experiments/logs/"

SAFEGUARD:
  USER_CONFIRMATION: false
  USER_CONFIRMATION_TEMPLATE: |
    I am about to perform the following action:
    Tool: {tool_name}
    Arguments: {tool_args}
    Additional Info: {user_confirmation_details}

    Please review the action above and confirm if you would like me to proceed.
    Please respond first with "CONFIRM" to proceed or "CANCEL" to abort. Then provide your additional notes after that if any.

  TOOL_RESPONSE_TEMPLATE: false

  TOOL_END_CONVERSATION_FLAG: true

  TOOL_BLOCKING: false

  TOOL_CALL_DISCLOSURE: false

  TOOL_CALL_DISCLOSURE_TEMPLATE: |
    Here is a summary of the tool calls to the EMR system or external systems the agent just made:
    {tool_call_disclosure}

  NO_TOOL_CALL_DISCLOSURE_MESSAGE: "No tool calls to EMR system or external systems have been made since the last message."

SIMULATION:
  TASK_FILE: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/experiments/data/MedAgentBench/test_data_v2_augmented.json"
  TYPE: "Original_Benchmark"
  MAX_STEPS: 40
  MAX_WORKERS: 20
