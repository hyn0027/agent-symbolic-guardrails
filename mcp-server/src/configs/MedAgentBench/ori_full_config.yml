DATASET:
  NAME: "MedAgentBench"
  DOCKER:
    IMAGE: "jyxsu6/medagentbench:latest"
    CONTAINER_NAME: "medagentbench_container"
    HOST_PORT: 8080
    CONTAINER_PORT: 8080
    READY_TIMEOUT: 180
    RESTART_IF_RUNNING: false
    REUSE_STOPPED_CONTAINER: true
    STOP_WHEN_END: false
    REMOVE_WHEN_STOPPED: false
  TMP_SAVE_DATA_PATH: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/data/MedAgentBench/tmp_save_data.json"
  TMP_LOAD_DATA_PATH: null
  SERVER:
    BASE_URL: "http://localhost:8080/fhir/"
    BLOCK_WRITE_API: false

SETTINGS:
  LOG_PATH: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/logs/mcp-server/"

SAFEGUARD:
  API_CHECK: true
  TOOL_BLOCKING: true
  API_REDESIGN: true
  RESPONSE_FILTERING: true
  USER_CONFIRMATION: true
  TOOL_CALL_DISCLOSURE: true

ERROR_HANDLING:
  SILENT_CHECK: false
