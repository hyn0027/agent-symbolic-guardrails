DATASET:
  NAME: "tau2"
  DOMAIN: "airline"

AGENT:
  MODEL: "gpt-5-nano"
  TEMPERATURE: 1.0

  MCP_SERVER_COMMAND: "start-mcp-server"

  MCP_SERVER_COMMAND_TEST_ARGS: "--config configs/tau2/test_config.yml"

  MCP_SERVER_COMMAND_GOLDEN_ARGS: "--config configs/tau2/golden_config.yml"

  TEST_WITH_GOLDEN: true

  MAX_GOLDEN_RETRIES: 5

  MAX_TOOL_CALL_FAILS: 10

  AGENT_INITIAL_MESSAGE: true

  INITIAL_CONVERSTION: "Hi! How can I help you today?"

  DOMAIN_POLICY_FILE: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/data/tau2/domains/airline/policy.md"

  SYSTEM_PROMPT_TEMPLATE: |
    <instructions>
    {agent_instruction}
    </instructions>
    <policy>
    {domain_policy}
    </policy>

  AGENT_INSTRUCTION: |
    You are a customer service agent that helps the user according to the <policy> provided below.
    In each turn you can either:
    - Send a message to the user.
    - Make a tool call.
    You cannot do both at the same time.

    Try to be helpful and always follow the policy.

USER:
  MODEL: "gpt-5-nano"
  TEMPERATURE: 1.0

  SYSTEM_PROMPT_TEMPLATE: |
    {global_user_sim_guidelines}

    <scenario>
    {instructions}
    </scenario>

  SIMULATION_GUIDELINE_PATH: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/data/tau2/user_simulator/simulation_guidelines.md"

EVAL:
  MODEL: "gpt-5-nano"
  TEMPERATURE: 1.0

SIMULATION:
  TASK_FILE: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/data/tau2/domains/airline/tasks.json"
  MAX_STEPS: 100

SETTINGS:
  LOG_PATH: "/Users/yhong3/Documents/Research/Software Security/working_repo/mcp-agent/logs/"

SAFEGUARD:
  USER_CONFIRMATION: true
  USER_CONFIRMATION_TEMPLATE: |
    I am about to perform the following action:
    Tool: {tool_name}
    Arguments: {tool_args}

    Please review the action above and confirm if you would like me to proceed.
    Please respond first with "CONFIRM" to proceed or "CANCEL" to abort. Then provide your additional notes after that if any.

  TOOL_RESPONSE_TEMPLATE: true

  TOOL_END_CONVERSATION_FLAG: true

  TOOL_CALL_DISCLOSURE: true

  TOOL_CALL_DISCLOSURE_TEMPLATE: |
    Here is a summary of the tool calls the agent just made:
    {tool_call_disclosure}

  TOOL_BLOCKING: true

  NO_TOOL_CALL_DISCLOSURE_MESSAGE: "No tool calls to the airline system or external systems have been made since the last message."
